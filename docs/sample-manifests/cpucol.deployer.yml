name: cpucol
service: app
port: 8000
compose:
  files:
    - docker-compose.yml
    - docker-compose.prod.yml
env_file: .env.prod
routes:
  - name: cpucol-prod-public
    subdomain: cpu
    path_prefix: /api/public/
    auth: none
    priority: 20
  - name: cpucol-prod
    subdomain: cpu
    exclude_path_prefix: /api/public/
    auth: sso
    priority: 10
healthcheck:
  path: /health
